name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v
        env:
          WECOM_CORP_ID: test
          WECOM_AGENT_ID: test
          WECOM_CORP_SECRET: test
          WECOM_TOKEN: test
          WECOM_ENCODING_AES_KEY: test
          OPENAI_API_KEY: test
          OPENAI_BASE_URL: https://api.openai.com/v1
          OPENAI_MODEL: gpt-4o

      - name: Build Docker image (smoke test)
        run: docker build -t lapland-bot:ci-test .
        if: success()

      - name: Clean up
        run: docker rmi lapland-bot:ci-test
        if: always()
        continue-on-error: true
